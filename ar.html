<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Casa 3D · Realidade Aumentada</title>

  <!-- model-viewer (AR cross-plataforma: Scene Viewer no Android, Quick Look no iPhone) -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>

  <!-- three.js só pra gerar o modelo (GLB/USDZ) em runtime -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #eef2f7;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    model-viewer { width: 100%; height: 100%; background: linear-gradient(160deg, #dbeafe, #f8fafc); }

    /* Botões de canto */
    .corner { position: fixed; z-index: 20; display: flex; gap: 8px; }
    .corner.tl { top: 10px; left: 10px; }
    .corner.tr { top: 10px; right: 10px; }
    .corner button, .ar-btn {
      border: 0; border-radius: 999px; cursor: pointer; font-weight: 700;
      font-size: clamp(12px, 3vw, 14px); padding: 9px 14px;
      background: rgba(255,255,255,0.92); color: #0f172a; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .ar-btn { background: #2563eb; color: #fff; }

    /* Hotspots clicáveis na porta/janela */
    .hotspot {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid #fff; background: #2563eb; color: #fff;
      font-size: 13px; line-height: 1; cursor: pointer; padding: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    }
    .hotspot:focus { outline: none; }

    /* Dica + carregando */
    #status {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 20;
      background: rgba(15,23,42,0.82); color: #fff; padding: 8px 14px; border-radius: 999px;
      font-size: clamp(11px, 3vw, 14px); max-width: 92%; text-align: center;
    }

    /* Popup de conteúdo */
    #info-popup {
      position: fixed; inset: 0; z-index: 40; display: none;
      align-items: center; justify-content: center; padding: clamp(14px, 5vw, 28px);
      background: rgba(15, 23, 42, 0.6);
    }
    #info-popup.show { display: flex; }
    .info-card {
      background: #fff; color: #0f172a; border-radius: 16px; width: min(420px, 92%);
      padding: clamp(16px, 4vw, 22px); box-shadow: 0 12px 40px rgba(0,0,0,0.35); text-align: center;
    }
    .info-img {
      width: 100%; height: clamp(130px, 28vh, 200px); background: #eef2f7; border-radius: 12px;
      overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 14px;
    }
    .info-img svg { height: 88%; width: auto; }
    .info-card h2 { margin: 0 0 8px; font-size: clamp(18px, 5vw, 22px); }
    .info-card p { margin: 0 0 16px; color: #475569; font-size: clamp(13px, 3.6vw, 15px); line-height: 1.5; }
    .info-card button { background: #2563eb; color: #fff; border: 0; border-radius: 10px; padding: 11px 22px; font-weight: 700; font-size: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="corner tl">
    <button id="btn-exit">✕ Sair</button>
  </div>

  <model-viewer
    id="mv"
    alt="Casa 3D"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    auto-rotate
    interaction-prompt="none">

    <!-- Botão de AR (apontar pro chão) -->
    <button slot="ar-button" class="ar-btn">📷 Ver no meu espaço (AR)</button>

    <!-- Hotspots clicáveis -->
    <button class="hotspot" slot="hotspot-door" data-position="-0.55 0.55 1.25" data-normal="0 0 1">🚪</button>
    <button class="hotspot" slot="hotspot-window" data-position="0.62 0.97 1.25" data-normal="0 0 1">🪟</button>
  </model-viewer>

  <div id="status">Carregando modelo…</div>

  <!-- Popup de conteúdo -->
  <div id="info-popup">
    <div class="info-card">
      <div class="info-img" id="info-img"></div>
      <h2 id="info-title"></h2>
      <p id="info-text"></p>
      <button id="info-close">Fechar</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
    import { USDZExporter } from 'three/addons/exporters/USDZExporter.js';

    const mv = document.getElementById('mv');
    const status = document.getElementById('status');

    function mat(color, extra) {
      return new THREE.MeshStandardMaterial(Object.assign({ color, roughness: 0.8 }, extra || {}));
    }

    // Casa com base em y=0 (assenta no chão no AR)
    function buildHouse() {
      const g = new THREE.Group();
      const W = 2.6, H = 1.7, D = 2.4, frontZ = D / 2;

      const body = new THREE.Mesh(new THREE.BoxGeometry(W, H, D), mat(0xf2e9da, { roughness: 0.85 }));
      body.position.y = H / 2; g.add(body);

      const roofH = 1.15, roofR = 1.72;
      const roof = new THREE.Mesh(new THREE.ConeGeometry(roofR, roofH, 4), mat(0xb14b3c, { roughness: 0.7 }));
      roof.rotation.y = Math.PI / 4; roof.position.y = H + roofH / 2; g.add(roof);

      const dFrame = new THREE.Mesh(new THREE.BoxGeometry(0.74, 1.13, 0.04), mat(0x4d3420, { roughness: 0.7 }));
      dFrame.position.set(-0.55, 0.565, frontZ + 0.005); g.add(dFrame);
      const door = new THREE.Mesh(new THREE.BoxGeometry(0.62, 1.05, 0.06), mat(0x6b4a2b, { roughness: 0.6 }));
      door.position.set(-0.55, 0.525, frontZ + 0.03); g.add(door);
      const knob = new THREE.Mesh(new THREE.SphereGeometry(0.045, 16, 16), mat(0xe6c14b, { metalness: 0.6, roughness: 0.3 }));
      knob.position.set(-0.34, 0.525, frontZ + 0.06); g.add(knob);

      const wFrame = new THREE.Mesh(new THREE.BoxGeometry(0.74, 0.74, 0.05), mat(0x4d3420, { roughness: 0.7 }));
      wFrame.position.set(0.62, 0.97, frontZ + 0.005); g.add(wFrame);
      const glass = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.62, 0.05),
        mat(0x9fd3e3, { roughness: 0.1, metalness: 0.1, transparent: true, opacity: 0.6 }));
      glass.position.set(0.62, 0.97, frontZ + 0.03); g.add(glass);
      const barV = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.62, 0.07), mat(0xece4d6));
      barV.position.set(0.62, 0.97, frontZ + 0.035); g.add(barV);
      const barH = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.05, 0.07), mat(0xece4d6));
      barH.position.set(0.62, 0.97, frontZ + 0.035); g.add(barH);

      return g;
    }

    // Gera GLB (Android/inline) e USDZ (iPhone) em runtime e alimenta o model-viewer
    (async function init() {
      try {
        const scene = new THREE.Scene();
        scene.add(buildHouse());

        const glb = await new Promise((res, rej) =>
          new GLTFExporter().parse(scene, res, rej, { binary: true }));
        const glbUrl = URL.createObjectURL(new Blob([glb], { type: 'model/gltf-binary' }));
        mv.src = glbUrl;

        try {
          const usdz = await new USDZExporter().parse(scene);
          const usdzUrl = URL.createObjectURL(new Blob([usdz], { type: 'model/vnd.usdz+zip' }));
          mv.setAttribute('ios-src', usdzUrl);
        } catch (e) { /* iOS usa USDZ auto-gerado se faltar */ }
      } catch (e) {
        status.textContent = 'Erro ao gerar o modelo: ' + e;
      }
    })();

    mv.addEventListener('load', () => {
      status.textContent = 'Arraste para girar · toque na porta/janela · “Ver no meu espaço” para AR';
    });

    // ---- Popup de conteúdo (imagem ilustrativa + texto + som genérico) ----
    const DOOR_SVG = '<svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">' +
      '<rect x="10" y="6" width="100" height="150" rx="4" fill="#8a5a2b"/>' +
      '<rect x="20" y="16" width="80" height="60" rx="3" fill="#6b4a2b"/>' +
      '<rect x="20" y="86" width="80" height="60" rx="3" fill="#6b4a2b"/>' +
      '<circle cx="92" cy="86" r="4" fill="#e6c14b"/></svg>';
    const WIN_SVG = '<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">' +
      '<rect x="8" y="8" width="144" height="144" rx="6" fill="#4d3420"/>' +
      '<rect x="20" y="20" width="120" height="120" fill="#9fd3e3"/>' +
      '<rect x="76" y="20" width="8" height="120" fill="#ece4d6"/>' +
      '<rect x="20" y="76" width="120" height="8" fill="#ece4d6"/></svg>';

    const INFO = {
      door:   { title: 'A Porta',  svg: DOOR_SVG, freq: 392,
        text: 'Conteúdo de demonstração: aqui entraria o material da aula sobre a porta — descrição, imagem real, vídeo, etc.' },
      window: { title: 'A Janela', svg: WIN_SVG,  freq: 587,
        text: 'Conteúdo de demonstração: aqui entraria o material da aula sobre a janela.' }
    };

    let audioCtx;
    function playTone(freq) {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain(), t = audioCtx.currentTime;
        o.type = 'sine'; o.frequency.value = freq;
        o.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
        o.start(t); o.stop(t + 0.47);
      } catch (e) {}
    }

    const infoPopup = document.getElementById('info-popup');
    function showInfo(key) {
      const i = INFO[key];
      document.getElementById('info-img').innerHTML = i.svg;
      document.getElementById('info-title').textContent = i.title;
      document.getElementById('info-text').textContent = i.text;
      infoPopup.classList.add('show');
      playTone(i.freq);
    }
    document.getElementById('info-close').addEventListener('click', () => infoPopup.classList.remove('show'));

    document.querySelector('[slot="hotspot-door"]').addEventListener('click', () => showInfo('door'));
    document.querySelector('[slot="hotspot-window"]').addEventListener('click', () => showInfo('window'));

    document.getElementById('btn-exit').addEventListener('click', () => { location.href = 'index.html'; });
  </script>
</body>
</html>
