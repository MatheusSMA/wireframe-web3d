<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Casa 3D · Realidade Aumentada</title>

  <!-- A-Frame + AR.js (versões fixadas e compatíveis) -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    :root { --safe-b: env(safe-area-inset-bottom, 0px); }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .a-enter-vr, .a-enter-ar { display: none !important; }

    /* Tudo vive dentro deste container — responsivo ao tamanho do iframe */
    #ar-root { position: fixed; inset: 0; overflow: hidden; }

    /* Cena, canvas e vídeo da câmera preenchem o container (sem esticar/cortar errado) */
    a-scene, .a-canvas {
      position: absolute !important; inset: 0 !important;
      width: 100% !important; height: 100% !important;
    }
    video, #arjs-video {
      position: absolute !important; inset: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
      margin: 0 !important; transform: none !important;
      z-index: 0;
    }
    .a-canvas { z-index: 1; }

    /* Dica (responsiva) */
    #hint {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      z-index: 20; max-width: 92%; text-align: center;
      background: rgba(15, 23, 42, 0.82); color: #fff;
      padding: 7px 12px; border-radius: 12px;
      font-size: clamp(11px, 3.2vw, 14px); line-height: 1.3;
      transition: opacity 0.3s ease;
    }
    #hint.hidden { opacity: 0; pointer-events: none; }

    /* Barra de controles (responsiva, quebra linha em telas pequenas) */
    #controls {
      position: absolute; left: 0; right: 0; bottom: 0;
      z-index: 20;
      display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
      padding: 8px; padding-bottom: calc(8px + var(--safe-b));
      background: linear-gradient(to top, rgba(15,23,42,0.6), rgba(15,23,42,0));
    }
    #controls button {
      border: 0; border-radius: 999px;
      padding: clamp(7px, 2vw, 11px) clamp(10px, 2.6vw, 16px);
      font-size: clamp(11px, 2.9vw, 14px); font-weight: 700;
      background: rgba(255,255,255,0.92); color: #0f172a;
      cursor: pointer; white-space: nowrap;
    }
    #controls button.primary { background: #2563eb; color: #fff; }
    #controls button.exit { background: rgba(15,23,42,0.8); color: #fff; }

    /* Painel do marcador (responsivo) */
    #marker-panel {
      position: absolute; inset: 0; z-index: 30;
      background: rgba(15, 23, 42, 0.94);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: clamp(16px, 5vw, 28px); text-align: center; color: #fff;
    }
    #marker-panel.show { display: flex; }
    #marker-panel img { width: clamp(120px, 45%, 220px); background: #fff; padding: 12px; border-radius: 12px; }
    #marker-panel p { max-width: 42ch; line-height: 1.5; margin: 0; font-size: clamp(12px, 3.4vw, 15px); }
    #marker-panel .close { background: #2563eb; border: 0; border-radius: 10px; padding: 11px 18px; font-weight: 700; cursor: pointer; color: #fff; }
  </style>
</head>
<body>
  <div id="ar-root">
    <div id="hint">📷 Aponte para o marcador <strong>Hiro</strong> (toque em “Alvo” para vê-lo).</div>

    <div id="controls">
      <button id="btn-door" class="primary">🚪 Porta</button>
      <button id="btn-window" class="primary">🪟 Janela</button>
      <button id="btn-wire">🔲 Wire</button>
      <button id="btn-marker">🎯 Alvo</button>
      <button id="btn-full">⛶ Tela cheia</button>
      <button id="btn-exit" class="exit">✕ Sair</button>
    </div>

    <div id="marker-panel">
      <p>Aponte a câmera para este marcador (imprima ou mostre em outra tela):</p>
      <img src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/data/images/hiro.png" alt="Marcador Hiro" />
      <p style="font-size:13px;opacity:.8">Marcador padrão “Hiro” do AR.js.</p>
      <button class="close" id="btn-marker-close">Entendi</button>
    </div>

    <!-- Componente que abre/fecha porta e janela com easing (gira pela dobradiça) -->
    <script>
      AFRAME.registerComponent('hinge', {
        schema: { openDeg: { default: -110 } },
        init: function () { this.open = false; this.current = 0; },
        toggle: function () { this.open = !this.open; },
        tick: function () {
          var target = this.open ? this.data.openDeg : 0;
          this.current += (target - this.current) * 0.18;
          this.el.object3D.rotation.y = THREE.MathUtils.degToRad(this.current);
        }
      });
    </script>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; alpha: true; antialias: true"
      arjs="sourceType: webcam; sourceWidth: 1280; sourceHeight: 960; detectionMode: mono; debugUIEnabled: false;">

      <a-marker preset="hiro" id="marker">
        <!-- Casa (escalada pra caber no marcador) -->
        <a-entity id="house" scale="0.5 0.5 0.5" position="0 0 0">

          <a-box id="body" position="0 0.85 0" width="2.6" height="1.7" depth="2.4"
                 material="color: #f2e9da; roughness: 0.85"></a-box>

          <a-cone id="roof" position="0 2.275 0" radius-bottom="1.72" radius-top="0"
                  height="1.15" segments-radial="4" rotation="0 45 0"
                  material="color: #b14b3c; roughness: 0.7"></a-cone>

          <!-- Batente da porta (fixo) -->
          <a-box position="-0.55 0.565 1.205" width="0.74" height="1.13" depth="0.04"
                 material="color: #4d3420"></a-box>

          <!-- Porta (dobradiça na borda esquerda) -->
          <a-entity id="doorPivot" position="-0.86 0.525 1.23" hinge="openDeg: -110">
            <a-box class="clickable" position="0.31 0 0" width="0.62" height="1.05" depth="0.06"
                   material="color: #6b4a2b; roughness: 0.6"></a-box>
            <a-sphere class="clickable" position="0.52 0 0.05" radius="0.045"
                      material="color: #e6c14b; metalness: 0.6; roughness: 0.3"></a-sphere>
          </a-entity>

          <!-- Moldura da janela (fixa) -->
          <a-box position="0.62 0.97 1.205" width="0.74" height="0.74" depth="0.05"
                 material="color: #4d3420"></a-box>

          <!-- Janela (folha que abre pela borda direita) -->
          <a-entity id="winPivot" position="0.93 0.97 1.24" hinge="openDeg: 95">
            <a-box class="clickable" position="-0.31 0 0" width="0.62" height="0.62" depth="0.05"
                   material="color: #9fd3e3; opacity: 0.55; transparent: true"></a-box>
            <a-box position="-0.31 0 0.01" width="0.05" height="0.62" depth="0.06" material="color: #ece4d6"></a-box>
            <a-box position="-0.31 0 0.01" width="0.62" height="0.05" depth="0.06" material="color: #ece4d6"></a-box>
          </a-entity>

        </a-entity>
      </a-marker>

      <a-entity camera>
        <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
      </a-entity>
    </a-scene>
  </div>

  <script>
    const marker = document.getElementById('marker');
    const hint = document.getElementById('hint');
    const house = document.getElementById('house');
    const doorPivot = document.getElementById('doorPivot');
    const winPivot = document.getElementById('winPivot');

    // Esconde a dica quando o marcador é encontrado
    marker.addEventListener('markerFound', () => hint.classList.add('hidden'));
    marker.addEventListener('markerLost', () => hint.classList.remove('hidden'));

    // Controles porta/janela
    document.getElementById('btn-door').addEventListener('click', () => doorPivot.components.hinge.toggle());
    document.getElementById('btn-window').addEventListener('click', () => winPivot.components.hinge.toggle());

    // Toque direto nas peças também abre/fecha
    document.querySelectorAll('#doorPivot .clickable').forEach(el =>
      el.addEventListener('click', () => doorPivot.components.hinge.toggle()));
    document.querySelectorAll('#winPivot .clickable').forEach(el =>
      el.addEventListener('click', () => winPivot.components.hinge.toggle()));

    // Wireframe
    let wire = false;
    document.getElementById('btn-wire').addEventListener('click', () => {
      wire = !wire;
      house.object3D.traverse(o => {
        if (o.isMesh && o.material) {
          (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => { m.wireframe = wire; });
        }
      });
    });

    // Painel do marcador
    const panel = document.getElementById('marker-panel');
    document.getElementById('btn-marker').addEventListener('click', () => panel.classList.add('show'));
    document.getElementById('btn-marker-close').addEventListener('click', () => panel.classList.remove('show'));

    // Tela cheia: dentro de iframe abre numa aba própria (jeito confiável no mobile);
    // fora de iframe usa a Fullscreen API.
    const inIframe = window.self !== window.top;
    document.getElementById('btn-full').addEventListener('click', () => {
      if (inIframe) { window.open(location.href, '_blank', 'noopener'); return; }
      const el = document.documentElement;
      if (!document.fullscreenElement) {
        (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
      } else if (document.exitFullscreen) {
        document.exitFullscreen();
      }
    });

    // Sair do AR -> volta pro widget 3D normal (no mesmo iframe)
    document.getElementById('btn-exit').addEventListener('click', () => { location.href = 'index.html'; });
  </script>
</body>
</html>
