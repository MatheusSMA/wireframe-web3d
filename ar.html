<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Casa 3D · Realidade Aumentada</title>

  <!-- A-Frame + AR.js (versões fixadas e compatíveis) -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    /* IMPORTANTE: não estilizar #arjs-video / .a-canvas — o AR.js cuida do tamanho do vídeo.
       Mexer nisso quebra o preenchimento da câmera. */
    html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; touch-action: none;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .a-enter-vr, .a-enter-ar { display: none !important; }

    /* Dica (responsiva ao tamanho do container/iframe) */
    #hint {
      position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
      z-index: 20; max-width: 92%; text-align: center;
      background: rgba(15, 23, 42, 0.82); color: #fff;
      padding: 7px 12px; border-radius: 12px;
      font-size: clamp(11px, 3.2vw, 14px); line-height: 1.3;
      transition: opacity 0.3s ease;
    }
    #hint.hidden { opacity: 0; pointer-events: none; }

    /* Barra de controles (responsiva — quebra linha em telas/iframes pequenos) */
    #controls {
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: 20;
      display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
      padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(to top, rgba(15,23,42,0.6), rgba(15,23,42,0));
    }
    #controls button {
      border: 0; border-radius: 999px;
      padding: clamp(7px, 2vw, 11px) clamp(10px, 2.6vw, 16px);
      font-size: clamp(11px, 2.9vw, 14px); font-weight: 700;
      background: rgba(255,255,255,0.92); color: #0f172a;
      cursor: pointer; white-space: nowrap;
    }
    #controls button.primary { background: #2563eb; color: #fff; }
    #controls button.exit { background: rgba(15,23,42,0.8); color: #fff; }

    /* Botão ativo */
    #controls button.active { background: #2563eb; color: #fff; }

    /* Opções laterais (Porta / Janela) — aparecem ao ativar "Controles" */
    #side-controls { display: none; }
    #side-controls.show { display: block; }
    .side-btn {
      position: fixed; top: 50%; transform: translateY(-50%);
      z-index: 21; border: 0; border-radius: 14px;
      padding: 16px 12px; font-size: clamp(12px, 3vw, 16px); font-weight: 800;
      line-height: 1.25; text-align: center;
      background: rgba(37, 99, 235, 0.95); color: #fff; cursor: pointer;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
    }
    #side-door { left: 10px; }
    #side-window { right: 10px; }
  </style>
</head>
<body>
  <div id="hint">📷 Aponte para o marcador <strong>Hiro</strong> · arraste para girar · toque na porta/janela.</div>

  <div id="controls">
    <button id="btn-actions">🎛️ Controles</button>
    <button id="btn-full">⛶ Tela cheia</button>
    <button id="btn-exit" class="exit">✕ Sair</button>
  </div>

  <!-- Opções laterais (aparecem ao ativar "Controles") -->
  <div id="side-controls">
    <button class="side-btn" id="side-door">🚪<br>Porta</button>
    <button class="side-btn" id="side-window">🪟<br>Janela</button>
  </div>

  <!-- Componente que abre/fecha porta e janela com easing (gira pela dobradiça) -->
  <script>
    AFRAME.registerComponent('hinge', {
      schema: { openDeg: { default: -110 } },
      init: function () { this.open = false; this.current = 0; },
      toggle: function () { this.open = !this.open; },
      tick: function () {
        var target = this.open ? this.data.openDeg : 0;
        this.current += (target - this.current) * 0.18;
        this.el.object3D.rotation.y = THREE.MathUtils.degToRad(this.current);
      }
    });
  </script>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; alpha: true; antialias: true"
    arjs="sourceType: webcam; sourceWidth: 1280; sourceHeight: 960; detectionMode: mono; debugUIEnabled: false;">

    <a-marker preset="hiro" id="marker"
              smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      <!-- Casa (escalada pra caber no marcador) -->
      <a-entity id="house" scale="0.5 0.5 0.5" position="0 0 0">

        <a-box id="body" position="0 0.85 0" width="2.6" height="1.7" depth="2.4"
               material="color: #f2e9da; roughness: 0.85"></a-box>

        <a-cone id="roof" position="0 2.275 0" radius-bottom="1.72" radius-top="0"
                height="1.15" segments-radial="4" rotation="0 45 0"
                material="color: #b14b3c; roughness: 0.7"></a-cone>

        <!-- Batente da porta (fixo) -->
        <a-box position="-0.55 0.565 1.205" width="0.74" height="1.13" depth="0.04"
               material="color: #4d3420"></a-box>

        <!-- Porta (dobradiça na borda esquerda) -->
        <a-entity id="doorPivot" position="-0.86 0.525 1.23" hinge="openDeg: -110">
          <a-box class="clickable" position="0.31 0 0" width="0.62" height="1.05" depth="0.06"
                 material="color: #6b4a2b; roughness: 0.6"></a-box>
          <a-sphere class="clickable" position="0.52 0 0.05" radius="0.045"
                    material="color: #e6c14b; metalness: 0.6; roughness: 0.3"></a-sphere>
        </a-entity>

        <!-- Moldura da janela (fixa) -->
        <a-box position="0.62 0.97 1.205" width="0.74" height="0.74" depth="0.05"
               material="color: #4d3420"></a-box>

        <!-- Janela (folha que abre pela borda direita) -->
        <a-entity id="winPivot" position="0.93 0.97 1.24" hinge="openDeg: 95">
          <a-box class="clickable" position="-0.31 0 0" width="0.62" height="0.62" depth="0.05"
                 material="color: #9fd3e3; opacity: 0.55; transparent: true"></a-box>
          <a-box position="-0.31 0 0.01" width="0.05" height="0.62" depth="0.06" material="color: #ece4d6"></a-box>
          <a-box position="-0.31 0 0.01" width="0.62" height="0.05" depth="0.06" material="color: #ece4d6"></a-box>
        </a-entity>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.getElementById('marker');
    const hint = document.getElementById('hint');
    const house = document.getElementById('house');
    const doorPivot = document.getElementById('doorPivot');
    const winPivot = document.getElementById('winPivot');

    // Esconde a dica quando o marcador é encontrado
    marker.addEventListener('markerFound', () => hint.classList.add('hidden'));
    marker.addEventListener('markerLost', () => hint.classList.remove('hidden'));

    // ---- Interação direta: arrastar pra girar a casa, tocar pra abrir porta/janela ----
    const sceneEl = document.querySelector('a-scene');
    const ray = new THREE.Raycaster();
    const ndc = new THREE.Vector2();

    function toggleAtPoint(clientX, clientY, canvas) {
      if (!sceneEl.camera) return;
      const rect = canvas.getBoundingClientRect();
      ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      ray.setFromCamera(ndc, sceneEl.camera);
      const hits = ray.intersectObjects([doorPivot.object3D, winPivot.object3D], true);
      if (!hits.length) return;
      let o = hits[0].object;
      while (o) {
        if (o === doorPivot.object3D) { doorPivot.components.hinge.toggle(); return; }
        if (o === winPivot.object3D)  { winPivot.components.hinge.toggle();  return; }
        o = o.parent;
      }
    }

    // Ignora gestos que começam nos botões da UI
    function isUI(t) { return t && t.closest && t.closest('#controls, #side-controls'); }

    // Eventos na janela (mais confiável que prender no canvas do AR.js):
    // arrastar = girar a casa; toque curto na porta/janela = abrir/fechar.
    let down = false, dragging = false, startX = 0, startY = 0, lastX = 0;
    window.addEventListener('pointerdown', (e) => {
      if (isUI(e.target)) return;
      down = true; dragging = false; startX = e.clientX; startY = e.clientY; lastX = e.clientX;
    });
    window.addEventListener('pointermove', (e) => {
      if (!down) return;
      const dx = e.clientX - lastX; lastX = e.clientX;
      if (Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY) > 6) dragging = true;
      if (dragging) house.object3D.rotation.y += dx * 0.01; // girar arrastando
    });
    window.addEventListener('pointerup', (e) => {
      if (!down) return; down = false;
      if (isUI(e.target)) return;
      const dist = Math.hypot(e.clientX - startX, e.clientY - startY);
      if (dist < 8 && sceneEl.canvas) toggleAtPoint(e.clientX, e.clientY, sceneEl.canvas);
    });
    window.addEventListener('pointercancel', () => { down = false; });

    // Botão "Controles": mostra/esconde as opções laterais Porta e Janela
    const sideControls = document.getElementById('side-controls');
    const btnActions = document.getElementById('btn-actions');
    btnActions.addEventListener('click', () => {
      const show = sideControls.classList.toggle('show');
      btnActions.classList.toggle('active', show);
    });
    document.getElementById('side-door').addEventListener('click', () => doorPivot.components.hinge.toggle());
    document.getElementById('side-window').addEventListener('click', () => winPivot.components.hinge.toggle());

    // Tela cheia NO LUGAR (mantém o contexto embedded que funciona dentro do iframe).
    // Não abre aba nova — abrir a ar.html solta é justamente o modo que quebra no celular.
    // Funciona no Android; no iOS o navegador ignora (e a câmera segue funcionando na caixa).
    const fsEl = document.documentElement;
    document.getElementById('btn-full').addEventListener('click', () => {
      const isFs = document.fullscreenElement || document.webkitFullscreenElement;
      if (!isFs) {
        const req = fsEl.requestFullscreen || fsEl.webkitRequestFullscreen;
        if (req) req.call(fsEl);
      } else {
        const exit = document.exitFullscreen || document.webkitExitFullscreen;
        if (exit) exit.call(document);
      }
    });

    // Sair do AR -> volta pro widget 3D normal (no mesmo iframe)
    document.getElementById('btn-exit').addEventListener('click', () => { location.href = 'index.html'; });
  </script>
</body>
</html>
